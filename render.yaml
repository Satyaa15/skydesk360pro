databases:
  - name: skydesk360-db
    databaseName: skydesk_db
    user: skydesk_user
    plan: free

services:
  - type: web
    name: skydesk360-backend
    env: docker
    plan: free
    rootDir: Backend
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 480
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: skydesk360-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://skydesk-frontend.onrender.com,https://skydesk360.com,https://www.skydesk360.com"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  - type: web
    name: skydesk360-frontend
    env: docker
    plan: free
    rootDir: Frontend
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
        # REQUIRED: Set this in Render dashboard to your backend URL
        # e.g. https://skydesk360-backend.onrender.com
